name: Price Monitor

on:
  schedule:
    - cron: '3/15 * * * *'  # 15분마다 실행 (UTC 기준)
  workflow_dispatch:       # 버튼을 눌러 수동으로 바로 실행해볼 수 있게 함
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4     # 최신 (Node 20+ 및 Node 24 호환 가능)
      
      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 (Node 20+ 및 Node 24 호환 가능)
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper
        
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python PriceMonitor.py  # 내 파이썬 파일 실행
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          # 변경사항이 있는지 확인
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update price tracking: ${GITHUB_RUN_ID}"
            
            # 🌟 이 부분이 핵심입니다! 
            # 리모트의 최신 상태를 가져와서 내 커밋을 그 뒤로 재배치합니다.
            git pull --rebase origin main
            
            git push
          else
            echo "No changes to commit"
          fi
