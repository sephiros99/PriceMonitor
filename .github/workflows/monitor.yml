name: Price Monitor

on:
  schedule:
    - cron: '0 */1 * * *'  # 1시간마다 실행 (UTC 기준)
  workflow_dispatch:       # 버튼을 눌러 수동으로 바로 실행해볼 수 있게 함
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4     # 최신 (Node 20+ 및 Node 24 호환 가능)
      
      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 (Node 20+ 및 Node 24 호환 가능)
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py  # 내 파이썬 파일 실행
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_price_*.txt
          # 변경사항이 있을 때만 커밋 (삭제된 파일도 포함되도록 git add -A 등을 고려할 수 있음)
          git commit -m "Update price tracking files" || echo "No changes to commit"
          git push
