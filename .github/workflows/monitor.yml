name: Price Monitor

on:
  schedule:
    - cron: '0 */1 * * *'  # 1시간마다 실행 (UTC 기준)
  workflow_dispatch:       # 버튼을 눌러 수동으로 바로 실행해볼 수 있게 함
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4     # 최신 (Node 20+ 및 Node 24 호환 가능)
      
      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 (Node 20+ 및 Node 24 호환 가능)
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper
        
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python PriceMonitor.py  # 내 파이썬 파일 실행
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 모든 변경사항(생성, 수정, 삭제)을 스테이징합니다. 
          # 파일이 없어도 에러를 내지 않습니다.
          git add -A
          
          # 2. 변경사항이 있는지 확인하고 있을 때만 커밋/푸시합니다.
          if ! git diff --staged --quiet; then
            git commit -m "Update price tracking: ${GITHUB_RUN_ID}"
            git push
          else
            echo "변경사항이 없어 푸시를 건너뜁니다."
          fi
